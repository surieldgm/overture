name: PR tests

on:
  pull_request:
    branches:
      - main

jobs:
  unittest:
    name: Python 3.11 unittest
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      OVERTURE_HOME: ${{ github.workspace }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify CI environment
        run: |
          test "$OVERTURE_HOME" = "$GITHUB_WORKSPACE"
          test "$(pwd)" = "$GITHUB_WORKSPACE"
          python --version

      - name: Install package
        run: python -m pip install -e .

      - name: Validate ticket fixtures
        run: python -m overture validate-ticket-fixtures

      - name: Run tests
        run: python -m unittest discover -s tests
